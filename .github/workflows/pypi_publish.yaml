name: PyPI Publish

on:
  push:
    tags:
      - "v*"

permissions: {}

concurrency:
  group: pypi-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-tag:
    name: Verify release tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.verify.outputs.tag }}
      version: ${{ steps.verify.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Python and uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7

      - id: verify
        name: Verify tag matches pyproject.toml and main
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          project_version="$(uv version --short)"

          if [[ "${version}" != "${project_version}" ]]; then
            echo "::error::Tag ${tag} does not match project version ${project_version}."
            exit 1
          fi

          if ! git merge-base --is-ancestor "${GITHUB_SHA}" "origin/main"; then
            echo "::error::Tag ${tag} must point to a commit reachable from origin/main."
            exit 1
          fi

          printf 'tag=%s\n' "${tag}" >> "${GITHUB_OUTPUT}"
          printf 'version=%s\n' "${version}" >> "${GITHUB_OUTPUT}"

  build:
    name: Build release distributions
    runs-on: ubuntu-latest
    needs: verify-tag
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Python and uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          cache-dependency-glob: uv.lock
          python-version: "3.12"

      - name: Build distributions
        run: make build

      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-package-distributions
          path: dist/*
          if-no-files-found: error

  pypi-publish:
    name: Publish package distributions to PyPI
    runs-on: ubuntu-latest
    needs:
      - verify-tag
      - build
    environment:
      name: pypi
      url: https://pypi.org/project/dify-plugin/${{ needs.verify-tag.outputs.version }}/
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-package-distributions
          path: dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
